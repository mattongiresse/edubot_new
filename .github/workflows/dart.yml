# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Flutter CI   # Nom clair pour savoir que c'est pour Flutter (tu peux changer si tu veux)

on:
  push:
    branches: [ "main" ]          # Déclenche sur push vers main
  pull_request:
    branches: [ "main" ]          # Déclenche aussi sur les PR vers main
                                  # → Ça protège ta branche principale automatiquement

jobs:
  build-and-test:                 # Nom du job principal (tu peux en ajouter d'autres plus tard)
    runs-on: ubuntu-latest        # Machine virtuelle Linux récente (gratuit et rapide pour Flutter)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # Étape obligatoire : récupère ton code du repo

      # Ancienne version (commentée) : setup Dart seul → pas adapté à Flutter
      # - uses: dart-lang/setup-dart@v1
      # - uses: dart-lang/setup-dart@9a04e6d73cca37bd455e0608d7e5092f881fd603

      # NOUVEAU : Installation de Flutter (inclut Dart automatiquement)
      # C'est la méthode recommandée en 2025-2026 pour les projets Flutter
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2   # Action officielle et très maintenue
        with:
          channel: 'stable'               # Canal stable = versions fiables et testées
          # flutter-version: '3.24.x'     # Optionnel : fixe une version précise si besoin (décommente si tu veux)
          cache: true                     # Active le cache → accélère énormément les runs suivants (pub get + SDK)
          # cache-key: 'flutter:{{ runner.os }}-{{ hashFiles('**/pubspec.lock') }}'  # Optionnel : cache plus intelligent

      - name: Install dependencies
        run: flutter pub get              # Installe les packages (comme en local)
                                          # → flutter pub get gère mieux les assets/fonts que dart pub get

      # Étape utile pour forcer un code propre (style Dart/Flutter officiel)
      # Décommente pour activer → échec si le code n'est pas formaté
      - name: Verify formatting (code style)
        run: dart format --output=none --set-exit-if-changed .
        # Alternative Flutter : flutter format --set-exit-if-changed .
        # Ajoute --fatal-infos si tu veux être encore plus strict

      - name: Analyze code (trouve bugs/warnings)
        run: flutter analyze              # Analyse statique Flutter + Dart
                                          # → Plus complet que dart analyze seul pour les widgets, etc.

      # Étape principale : lance tes tests (unit + widget tests)
      # flutter test est obligatoire pour tes fichiers test/widget_test.dart
      - name: Run widget + unit tests
        run: flutter test --machine --coverage
        # --machine → format de sortie lisible dans GitHub Actions (logs clairs)
        # --coverage → génère un rapport de couverture (lcov.info) → utile plus tard pour badge/coveralls
        # Si tu veux voir plus de détails : flutter test -v (verbose)

      # Bonus futur : si tu veux build un APK (décommente quand prêt)
      # - name: Build APK (debug)
      #   run: flutter build apk --debug
      #   # Ou flutter build apk --release pour une version release
